<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>究極体現型：ファラオの百人一首 - 収束と再生</title>
  <style>
    body { margin: 0; background: black; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'serif', sans-serif; color: white; user-select: none; }
    #game-container { position: relative; width: 640px; height: 460px; background: black; border: 2px solid #333; box-shadow: 0 0 30px rgba(0, 255, 255, 0.5); overflow: hidden; }
    
    /* 収束アニメーション用のピース */
    .reward-piece {
      position: absolute;
      width: 160px; height: 115px; /* 4x4分割 */
      background-size: 640px 460px;
      transition: all 2.0s cubic-bezier(0.15, 0.85, 0.35, 1.2); /* ゆっくりと収束 */
      z-index: 100; pointer-events: none;
    }

    /* 各種UIエリア */
    .scene-element { position: absolute; width: 100%; height: 100%; top: 0; left: 0; display: none; }
    #dialogue-box, #message-box {
      width: 80%; padding: 15px; background: rgba(0,0,0,0.8); border: 2px solid cyan; border-radius: 10px;
      text-align: center; font-size: 1.4em; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 50; display:none;
    }
    
    .cover { position: absolute; width: 50%; height: 50%; cursor: pointer; z-index: 10; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box;}
    #scene-img { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
    #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; z-index: 200; display:none; text-shadow: 0 0 20px cyan; }

    /* ご褒美エリア */
    #reward-area {
      position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #222, #000);
      display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 80;
    }
    #reward-message { font-size: 2em; color: gold; text-shadow: 0 0 10px gold; margin-bottom: 20px; }
    .nav-button { padding: 12px 24px; font-size: 18px; cursor: pointer; background: cyan; color: black; border: none; border-radius: 5px; font-weight: bold; margin: 10px; transition: 0.3s; }
    .nav-button:hover { transform: scale(1.1); box-shadow: 0 0 15px cyan; }

    #game-over-area { position: absolute; width: 100%; height: 100%; background: rgba(50,0,0,0.9); display:none; flex-direction: column; justify-content: center; align-items: center; z-index: 90; }
  </style>
</head>
<body>

<div id="game-container">
  <img id="scene-img" src="scene99.jpg">
  <div id="message-box"></div>
  <div id="countdown"></div>

  <div id="reward-area">
    <div id="reward-message">選ばれし者への贈り物</div>
    <div id="reward-buttons">
      <button class="nav-button" onclick="selectReward('A')">黄金の選択 A</button>
      <button class="nav-button" onclick="selectReward('B')">神秘の選択 B</button>
      <button class="nav-button" onclick="selectReward('C')">静寂の選択 C</button>
    </div>
    <div id="reward-stage" style="width:640px; height:460px; position:absolute; top:0; left:0; pointer-events:none;"></div>
    
    <div id="reward-final-buttons" style="display:none; position:absolute; bottom:20px; z-index:110;">
      <button class="nav-button" onclick="location.reload()">最初から遊ぶ</button>
    </div>
  </div>

  <div id="game-over-area">
    <h1 style="color:red;">GAME OVER</h1>
    <div id="game-over-message"></div>
    <button class="nav-button" onclick="location.reload()">再挑戦</button>
  </div>
</div>

<script>
  const gameContainer = document.getElementById('game-container');
  const sceneImg = document.getElementById('scene-img');
  const messageBox = document.getElementById('message-box');
  const countdown = document.getElementById('countdown');
  const rewardArea = document.getElementById('reward-area');
  const rewardStage = document.getElementById('reward-stage');

  // ゲーム状態
  let currentIndex = 0;
  let totalScore = 0;
  let currentPart = 'practice';
  const practiceScenes = ["scene99", "scene70"]; // 簡略化
  const secondScenes = ["scene60", "scene61", "scene62"]; 

  // --- ゲーム開始 ---
  window.onload = () => {
    showMessage("【ファラオの試練】開始...", () => startPart('practice'));
  };

  function startPart(part) {
    currentPart = part;
    currentIndex = 0;
    loadScene();
  }

  function loadScene() {
    const list = currentPart === 'practice' ? practiceScenes : secondScenes;
    if (currentIndex >= list.length) {
      if (currentPart === 'practice') startPart('second');
      else showFinalResult();
      return;
    }
    
    const sName = list[currentIndex];
    sceneImg.src = `${sName}.jpg`;
    gameContainer.querySelectorAll('.cover').forEach(e => e.remove());

    for (let i = 1; i <= 4; i++) {
      const c = document.createElement('div');
      c.className = 'cover';
      c.style.backgroundColor = `rgba(0,${i*40},${i*60},0.8)`;
      c.style.top = i <= 2 ? '0' : '50%';
      c.style.left = (i % 2 === 1) ? '0' : '50%';
      c.onclick = () => {
        c.style.display = 'none';
        if (document.querySelectorAll('.cover[style*="display: none"]').length === 4) {
          totalScore += 100;
          currentIndex++;
          setTimeout(loadScene, 1000);
        }
      };
      gameContainer.appendChild(c);
    }
  }

  function showFinalResult() {
    showMessage(`最終得点: ${totalScore}`, () => {
      if (totalScore >= 200) showRewardSelection();
      else showMessage("得点が足りません...", () => location.reload());
    });
  }

  function showRewardSelection() {
    rewardArea.style.display = 'flex';
    setTimeout(() => rewardArea.style.opacity = 1, 100);
  }

  // --- 劇的な収束演出 ---
  function selectReward(choice) {
    document.getElementById('reward-buttons').style.display = 'none';
    const imgUrl = `reward_${choice.toLowerCase()}.jpg`; 
    rewardStage.innerHTML = "";

    const rows = 4, cols = 4;
    const pW = 640 / cols;
    const pH = 460 / rows;

    for (let i = 0; i < rows * cols; i++) {
      const x = (i % cols) * pW;
      const y = Math.floor(i / cols) * pH;
      const p = document.createElement('div');
      p.className = 'reward-piece';
      p.style.width = pW + "px"; p.style.height = pH + "px";
      p.style.left = x + "px"; p.style.top = y + "px";
      p.style.backgroundImage = `url(${imgUrl})`;
      p.style.backgroundPosition = `-${x}px -${y}px`;

      // 初期状態：バラバラに散らす（画面外から）
      const rx = (Math.random() - 0.5) * 1000;
      const ry = (Math.random() - 0.5) * 1000;
      const rot = Math.random() * 720;
      p.style.transform = `translate(${rx}px, ${ry}px) rotate(${rot}deg) scale(0)`;
      p.style.opacity = "0";

      rewardStage.appendChild(p);
      
      // 収束開始
      setTimeout(() => {
        p.style.transform = "translate(0,0) rotate(0deg) scale(1)";
        p.style.opacity = "1";
      }, 100 + i * 50);
    }

    setTimeout(() => {
      document.getElementById('reward-final-buttons').style.display = 'block';
    }, 4000);
  }

  function showMessage(msg, cb) {
    messageBox.innerText = msg;
    messageBox.style.display = 'block';
    messageBox.style.opacity = 1;
    setTimeout(() => {
      messageBox.style.opacity = 0;
      setTimeout(() => { messageBox.style.display = 'none'; if(cb) cb(); }, 500);
    }, 2000);
  }
</script>
</body>
</html>
