<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ファラオの百人一首ゲーム - 再構成版</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Arial Black', sans-serif;
      color: white;
      user-select: none;
    }

    #game-container {
      position: relative;
      width: 640px;
      height: 460px;
      background: black;
      border: 2px solid #333;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .scene-element {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      display: none;
    }

    #dialogue-scene {
      background-image: url('scene99.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      z-index: 20;
      opacity: 0;
      transition: opacity 3s ease-in;
    }

    #dialogue-box, #message-box {
      width: 80%;
      padding: 15px;
      margin-bottom: 20px;
      background-color: rgba(0, 0, 0, 0.7);
      border: 2px solid #00FFFF;
      border-radius: 10px;
      text-align: center;
      font-size: 1.5em;
      line-height: 1.4em;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
      z-index: 3;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
    }

    .piece {
      position: absolute;
      width: calc(100% / 7);
      height: calc(100% / 7);
      background-image: url('intro_cover_49.jpg');
      background-size: 700% 700%;
      opacity: 1;
      transition: transform 1s ease-out, opacity 1s ease-out;
    }

    .button-box {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 20px;
      z-index: 10;
    }

    .nav-button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background-color: cyan;
      color: black;
      cursor: pointer;
    }

    #countdown {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 32px;
      display: block;
      z-index: 2;
    }

    .cover {
      position: absolute;
      width: 50%;
      height: 50%;
      cursor: pointer;
      z-index: 1;
    }

    #scene-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      z-index: -1;
    }

    #reward-area, #game-over-area { /* ゲームオーバー画面も追加 */
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 30;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    #reward-message, #game-over-message {
        font-size: 2em;
        margin-bottom: 20px;
        color: lime;
    }

    #reward-buttons {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    #reward-image-display {
        max-width: 90%;
        max-height: 70%;
        object-fit: contain;
        display: none;
        margin-top: 20px;
        border: 3px solid gold;
        box-shadow: 0 0 15px gold;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="dialogue-scene" class="scene-element">
      <div id="dialogue-box"></div>
    </div>
    <img id="scene-img" src="" alt="Scene">
    <div id="countdown"></div>
    <div id="message-box"></div>

    <div id="reward-area">
        <div id="reward-message"></div>
        <div id="reward-buttons">
            <button id="reward-A-btn" class="nav-button">A</button>
            <button id="reward-B-btn" class="nav-button">B</button>
            <button id="reward-C-btn" class="nav-button">C</button>
        </div>
        <img id="reward-image-display" src="" alt="ご褒美画像">
        <div class="button-box" id="reward-final-buttons" style="margin-top: 40px;">
            <button id="back-to-2nd-from-reward-btn" class="nav-button">第二部に戻る</button>
            <button id="end-game-from-reward-btn" class="nav-button">ゲームを終了する</button>
        </div>
    </div>

    <div id="game-over-area">
        <div id="game-over-message"></div>
        <div class="button-box" id="game-over-buttons" style="margin-top: 40px;">
            <button id="retry-current-part-btn" class="nav-button"></button> <button id="exit-game-btn" class="nav-button">ゲームを終了する</button>
        </div>
    </div>
  </div>

  <script>
    const gameContainer = document.getElementById('game-container');
    const dialogueScene = document.getElementById('dialogue-scene');
    const dialogueBox = document.getElementById('dialogue-box');
    const sceneImg = document.getElementById('scene-img');
    const countdown = document.getElementById('countdown');
    const messageBox = document.getElementById('message-box');
    const rewardArea = document.getElementById('reward-area');
    const rewardMessage = document.getElementById('reward-message');
    const rewardButtons = document.getElementById('reward-buttons');
    const rewardImageDisplay = document.getElementById('reward-image-display');
    const rewardBtnA = document.getElementById('reward-A-btn');
    const rewardBtnB = document.getElementById('reward-B-btn');
    const rewardBtnC = document.getElementById('reward-C-btn');
    const rewardFinalButtons = document.getElementById('reward-final-buttons'); // ご褒美選択後の最終ボタン
    const backTo2ndFromRewardBtn = document.getElementById('back-to-2nd-from-reward-btn');
    const endGameFromRewardBtn = document.getElementById('end-game-from-reward-btn');

    const gameOverArea = document.getElementById('game-over-area'); // 新規追加
    const gameOverMessage = document.getElementById('game-over-message'); // 新規追加
    const gameOverButtons = document.getElementById('game-over-buttons'); // 新規追加
    const retryCurrentPartBtn = document.getElementById('retry-current-part-btn'); // 新規追加
    const exitGameBtn = document.getElementById('exit-game-btn'); // 新規追加


    const introGuideMessages = [
      "このゲームでは、画像が4つのピースに分かれています。",
      "順番にタップして、カバー画像をすべて外してください。",
      "すべて剥がすと、次のステージに進みます。",
      "全ステージクリアで、あなたにご褒美が待っています！"
    ];

    // 各パートのシーンリストを定義
    const practicePartScenes = ["scene99", "scene70", "scene72", "scene73"]; // 練習用 (導入部後)
    const firstPartScenes = ["scene99", "scene50", "scene51", "scene52"];  // 第一部 (本来の第一部)
    const secondPartScenes = ["scene60", "scene61", "scene62", "scene63"]; // 第二部
    const thirdPartScenes = []; // 第三部 (未実装、9分割用)

    // 現在のゲームの状態を管理する変数
    let currentPart = 'intro'; // 'intro', 'practice', 'firstPart', 'secondPart', 'thirdPart'
    let currentPartSceneList = [];
    let currentPartStartIndex = 0; // 現在のパートの開始インデックス（sceneList全体に対して）

    let currentIndex = 0; // 現在のパート内のシーンインデックス
    let clickSequence = [];

    let totalScore = 0; // 第二部のみで利用
    let playCount = 0; // 各主要パートでリセットされる挑戦回数
    const MAX_PLAY_COUNT = 5; // 最大挑戦回数

    const rewardImages = {
        A: 'reward_a.jpg',
        B: 'reward_b.jpg',
        C: 'reward_c.jpg'
    };

    // --- 導入ガイドシーケンス表示 (変更なし) ---
    function showIntroGuideSequence() {
      dialogueScene.style.display = 'flex';
      dialogueScene.style.opacity = 1;
      dialogueBox.style.opacity = 1;

      let index = 0;
      const interval = setInterval(() => {
        if (index < introGuideMessages.length) {
          dialogueBox.textContent = introGuideMessages[index++];
        } else {
          clearInterval(interval);
          dialogueBox.style.opacity = 0;
          dialogueScene.style.opacity = 0;
          setTimeout(() => {
            dialogueScene.style.display = 'none';
            startMagicPerformance();
          }, 1000);
        }
      }, 2000);
    }

    // --- 導入マジックパフォーマンス (変更なし) ---
    function startMagicPerformance() {
      clearGameContainer();

      const pot = document.createElement('img');
      pot.src = 'magic_pot.png';
      pot.style.position = 'absolute';
      pot.style.width = '100%';
      pot.style.height = '100%';
      pot.style.objectFit = 'cover';
      gameContainer.appendChild(pot);

      const totalRows = 7, totalCols = 7;
      for (let row = 0; row < totalRows; row++) {
        for (let col = 0; col < totalCols; col++) {
          const piece = document.createElement('div');
          piece.className = 'piece';
          piece.style.left = `${(100 / totalCols) * col}%`;
          piece.style.top = `${(100 / totalRows) * row}%`;
          piece.style.backgroundPosition = `${(-100 / 6) * col}% ${(-100 / 6) * row}%`;
          gameContainer.appendChild(piece);

          setTimeout(() => {
            piece.style.transform = `translate(${(Math.random() - 0.5) * 200}px, ${(Math.random() - 0.5) * 200}px)`;
            piece.style.opacity = 0;
          }, 100 + 20 * (row * totalCols + col));
        }
      }

      setTimeout(() => {
        showNavButtons();
      }, 3000);
    }

    // --- ナビゲーションボタン表示 (変更: 次のパートの開始を設定) ---
    function showNavButtons() {
      const buttonBox = document.createElement('div');
      buttonBox.className = 'button-box';
      buttonBox.style.display = 'flex';

      const backBtn = document.createElement('button');
      backBtn.textContent = '最初へ戻る';
      backBtn.className = 'nav-button';
      backBtn.onclick = () => location.reload();

      const nextBtn = document.createElement('button');
      nextBtn.textContent = 'ゲームへ進む';
      nextBtn.className = 'nav-button';
      nextBtn.onclick = () => {
        buttonBox.style.display = 'none';
        clearGameContainer();
        // 練習パートの開始
        startPart('practice');
      };

      buttonBox.appendChild(backBtn);
      buttonBox.appendChild(nextBtn);
      gameContainer.appendChild(buttonBox);
    }

    // --- 各パートを開始する汎用関数 (新規追加) ---
    function startPart(partName) {
        currentPart = partName;
        currentIndex = 0; // 各パートの開始時にはインデックスをリセット
        playCount = 0; // 各主要パートの開始時に挑戦回数をリセット

        if (partName === 'practice') {
            currentPartSceneList = practicePartScenes;
            currentPartStartIndex = 0;
            // 練習パート開始の案内メッセージ
            showMessage("【練習パート】\n画像を4回剥がしてください。順序は問いません。", () => {
                startCountdown(loadCurrentScene); // 練習パート開始前のカウントダウン
            }, 3000);
        } else if (partName === 'firstPart') {
            currentPartSceneList = firstPartScenes;
            currentPartStartIndex = 0; // 第一部はインデックス0から
            // 第一部開始の案内メッセージ
            showMessage("【第一部開始】\n画像を4回剥がしてください。\n3枚目には順序があります。", () => {
                startCountdown(loadCurrentScene); // 第一部開始前のカウントダウン
            }, 3000);
        } else if (partName === 'secondPart') {
            currentPartSceneList = secondPartScenes;
            currentPartStartIndex = 0; // 第二部はインデックス0から
            totalScore = 0; // 第二部開始時に得点をリセット
            // 第二部開始の案内メッセージ
            showMessage("【第二部開始】\n画像を4回剥がして、得点を目指しましょう。\n2枚目と3枚目には順序があります。", () => {
                startCountdown(loadCurrentScene); // 第二部開始前のカウントダウン
            }, 4000);
        } else if (partName === 'thirdPart') {
            // 第三部開始の案内と準備
            currentPartSceneList = thirdPartScenes;
            currentPartStartIndex = 0;
            showMessage("【第三部開始】\nここからは9分割です！", () => {
                startCountdown(loadCurrentScene); // 第三部開始前のカウントダウン
            }, 3000);
        }
    }

    // --- カウントダウンを開始する汎用関数 (コールバックを受け取る) ---
    function startCountdown(callbackFunc, ...args) {
        countdown.innerText = "4";
        countdown.style.display = 'block';
        let count = 4;
        const timer = setInterval(() => {
            count--;
            if (count > 0) {
                countdown.innerText = count;
            } else {
                clearInterval(timer);
                countdown.style.display = 'none';
                callbackFunc(...args);
            }
        }, 1000);
    }

    // --- 現在のパートの現在のシーンをロードする (startSceneから変更) ---
    function loadCurrentScene() {
        if (currentIndex < currentPartSceneList.length) {
            const sceneName = currentPartSceneList[currentIndex];
            sceneImg.src = `${sceneName}.jpg`;
            clickSequence = [];

            document.querySelectorAll('.cover').forEach(el => el.remove());

            for (let i = 1; i <= 4; i++) {
                const part = document.createElement('img');
                part.src = `${sceneName}_part${i}.jpg`;
                part.className = 'cover';
                part.dataset.index = i;

                part.style.top = i <= 2 ? '0' : '50%';
                part.style.left = (i % 2 === 1) ? '0' : '50%';

                part.addEventListener('click', () => {
                    part.style.display = 'none';
                    clickSequence.push(i);
                    checkComplete(sceneName);
                });
                gameContainer.appendChild(part);
            }
        } else {
            // 現在のパートの全ステージをクリアした場合の処理
            handlePartCompletion();
        }
    }


    // --- 完了チェック (大幅変更) ---
    function checkComplete(sceneName) {
      const remaining = document.querySelectorAll('.cover');
      const allHidden = [...remaining].every(c => c.style.display === 'none');

      if (allHidden) {
        let isCorrect = true;
        let correctOrder = [];

        // 各パートの各ステージに応じた順序指定
        if (currentPart === 'firstPart' && sceneName === "scene51") { // 第一部の3枚目 (sceneList[2])
            correctOrder = [3, 1, 4, 2];
        } else if (currentPart === 'secondPart') {
            if (sceneName === "scene61") { // 第二部の2枚目
                correctOrder = [2, 4, 1, 3]; // ここに第二部2枚目の正しい順序
            } else if (sceneName === "scene62") { // 第二部の3枚目 (第一部の3枚目と画像名が同じ)
                correctOrder = [1, 3, 2, 4]; // ここに第二部3枚目の正しい順序 (例)
            }
        }

        if (correctOrder.length > 0) { // 順序指定がある場合のみチェック
            isCorrect = clickSequence.length === correctOrder.length && correctOrder.every((val, idx) => val === clickSequence[idx]);
        }

        if (!isCorrect) {
            playCount++; // 失敗したらプレイ回数を加算
            showMessage(`順番が違います！失敗！残り ${MAX_PLAY_COUNT - playCount} 回。`, () => {
                if (playCount >= MAX_PLAY_COUNT) {
                    showGameOver(`【${currentPart === 'firstPart' ? '第一部' : '第二部'}】残念！${MAX_PLAY_COUNT}回以内にクリアできませんでした。`);
                } else {
                    resetCurrentScene(); // 現在のステージをリセットしてリトライ
                }
            });
            return;
        }

        // 得点計算 (第二部のみ)
        if (currentPart === 'secondPart') {
            // 仮の得点加算。減点ロジックは別途実装
            totalScore += 100;
        }

        setTimeout(() => {
          currentIndex++; // 現在のパート内の次のシーンへ
          document.querySelectorAll('.cover').forEach(el => el.remove()); // カバーを削除
          loadCurrentScene(); // 次のシーンをロード、またはパート完了処理へ
        }, 500);
      }
    }

    // --- 現在のシーンをリセット (resetSceneから変更) ---
    function resetCurrentScene() {
      document.querySelectorAll('.cover').forEach(el => el.remove());
      clickSequence = [];
      loadCurrentScene(); // カウントダウンなしで即座にリセット
    }

    // --- 各パートの完了処理 (新規追加) ---
    function handlePartCompletion() {
        document.querySelectorAll('.cover').forEach(el => el.remove()); // 残っているカバーを削除

        if (currentPart === 'practice') {
            // 練習パート完了 -> 第一部へ
            showMessage("練習パートクリア！次は【第一部】です。", () => {
                startPart('firstPart');
            }, 3000);
        } else if (currentPart === 'firstPart') {
            // 第一部完了 -> 第二部へ
            showMessage("第一部クリア！いよいよ【第二部】です。", () => {
                startPart('secondPart');
            }, 3000);
        } else if (currentPart === 'secondPart') {
            // 第二部完了 -> 最終結果表示
            showMessage("第二部クリア！最終結果発表！", () => {
                showFinalResult();
            }, 3000);
        } else if (currentPart === 'thirdPart') {
            // 第三部完了 -> 最終ゲームクリアなど (未実装)
            showMessage("全ゲームクリア！おめでとうございます！", () => {
                // finalGameCompletion();
            }, 3000);
        }
    }

    // --- 最終結果表示 (第二部クリア後) ---
    function showFinalResult() {
      clearGameContainer();
      sceneImg.src = "scene07.jpg";
      messageBox.style.opacity = 1;
      messageBox.style.display = 'block';

      const messages = [
        "第二部クリア！おめでとうございます！",
        `最終得点: ${totalScore} 点`,
      ];

      let index = 0;
      const interval = setInterval(() => {
        if (index < messages.length) {
          messageBox.textContent = messages[index++];
        } else {
          clearInterval(interval);
          messageBox.style.opacity = 0;
          setTimeout(() => {
            messageBox.style.display = 'none';
            checkRewardAvailability(); // 得点に応じたご褒美判定へ
          }, 500);
        }
      }, 2000);
    }

    // --- ご褒美条件判定と表示 ---
    function checkRewardAvailability() {
        if (totalScore >= 300) {
            startCountdown(showRewardSelection); // ご褒美選択画面前のカウントダウン
        } else {
            showMessage("残念！ご褒美には届きませんでした。", () => {
                showFinalButtons('reward'); // ご褒美なしの場合も最終ボタン表示
            });
        }
    }

    // --- ご褒美選択画面表示 ---

function showRewardSelection() {
    clearGameContainer(); // 先に掃除
    sceneImg.src = "scene07.jpg";

    // 掃除の後に表示をONにする（順番が大事！）
    rewardArea.style.display = 'flex'; 
    setTimeout(() => {
        rewardArea.style.opacity = 1;
        rewardButtons.style.display = 'flex'; // ボタンを表示
    }, 100);

    rewardMessage.textContent = "ご褒美を選択してください！";
    rewardImageDisplay.style.display = 'none';
    rewardFinalButtons.style.display = 'none';
}


    // --- ご褒美選択と画像表示 ---
    function selectReward(choice) {
        rewardButtons.style.display = 'none';
        rewardMessage.textContent = `「${choice}」を選びました！`;
        rewardImageDisplay.src = rewardImages[choice];
        rewardImageDisplay.style.display = 'block';

        setTimeout(() => {
            showFinalButtons('reward'); // ご褒美選択後の最終ボタン表示
        }, 2000);
    }

    // --- ゲームオーバー画面表示 (新規追加) ---
    function showGameOver(message) {
        clearGameContainer();
        sceneImg.src = "scene07.jpg"; // ゲームオーバー画面の背景
        gameOverArea.style.display = 'flex';
        setTimeout(() => gameOverArea.style.opacity = 1, 100);

        gameOverMessage.textContent = message;
        gameOverButtons.style.display = 'flex';

        retryCurrentPartBtn.textContent = `もう一度 ${currentPart === 'firstPart' ? '第一部' : '第二部'} に挑戦`;
        retryCurrentPartBtn.onclick = () => {
            gameOverArea.style.display = 'none'; // ゲームオーバー画面を閉じる
            clearGameContainer(); // 画面をクリア
            startPart(currentPart); // 現在のパートの最初からリトライ
        };
        exitGameBtn.onclick = () => {
            location.reload(); // ページをリロードしてゲーム全体を終了
        };
    }

    // --- 最終ボタン表示 (どの画面から表示されるか指定) ---
    function showFinalButtons(fromScreen) {
        // ご褒美選択画面からのボタン
        if (fromScreen === 'reward') {
            rewardFinalButtons.style.display = 'flex';
            backTo2ndFromRewardBtn.onclick = () => {
                // 第二部の最初からやり直す処理
                clearGameContainer(); // 画面をクリア
                startPart('secondPart'); // 第二部の開始から
            };
            endGameFromRewardBtn.onclick = () => {
                location.reload(); // ゲーム全体を終了
            };
        } else { // その他の最終結果やゲームオーバーからの場合 (今回はゲームオーバー画面が処理)
            // この'else'ブロックは現状使われないか、あるいは一般的なゲーム終了処理に繋がる
            // 現在はshowGameOverでボタンが直接制御されています
        }
    }


    // --- メッセージ表示ヘルパー関数 (変更なし) ---
    function showMessage(msg, callback = null, duration = 2000) {
        messageBox.textContent = msg;
        messageBox.style.opacity = 1;
        messageBox.style.display = 'block';
        setTimeout(() => {
            messageBox.style.opacity = 0;
            setTimeout(() => {
                messageBox.style.display = 'none';
                if (callback) callback();
            }, 500);
        }, duration);
    }


    // --- game-container の子要素を全てクリアするヘルパー関数 (変更: gameOverAreaも管理) ---
    function clearGameContainer() {
      const preservedElements = [sceneImg, countdown, messageBox, dialogueScene, rewardArea, gameOverArea];
      gameContainer.innerHTML = '';

      preservedElements.forEach(el => {
        if (el && !gameContainer.contains(el)) {
          gameContainer.appendChild(el);
        }
      });
      rewardArea.style.display = 'none';
      rewardArea.style.opacity = 0;
     //gameOverArea.style.display = 'none'; // ゲームオーバーエリアも非表示に
     //gameOverArea.style.opacity = 0;
      dialogueScene.style.display = 'none';
    }


rewardBtnA.onclick = () => selectReward('A');
rewardBtnB.onclick = () => selectReward('B');
rewardBtnC.onclick = () => selectReward('C');



    // --- ゲーム開始のエントリーポイント (変更なし) ---
    window.onload = () => {
      clearGameContainer();
      showIntroGuideSequence();
    };
  </script>
</body>
</html>
